name: nexplay
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  cloud_firestore: ^6.5.0
  cloudinary_public: ^0.23.1
  crypto: ^3.0.7
  dio: ^5.9.2
  firebase_auth: ^6.5.2
  firebase_core: ^4.10.0
  flame: ^1.37.0
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_svg: ^2.3.0
  flutter_stripe: ^12.0.0
  google_sign_in: ^6.2.1
  image_picker: ^1.2.2
  intl: ^0.20.2
  lottie: ^3.3.3
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  webview_flutter: ^4.13.1
  html: ^0.15.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
    - assets/games/
    - assets/banner/
    - assets/wallpaper/
